name: Split Monorepo to Separate Repos

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - local: packages/core
            repo: synapse-core
            name: Core
          - local: packages/admin
            repo: synapse-admin
            name: Admin
          - local: packages/chat
            repo: synapse-chat
            name: Chat
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split ${{ matrix.package.name }} package
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Clone target repo
          git clone "https://x-access-token:${{ secrets.SYNAPSE_SPLIT_TOKEN }}@github.com/arnaudmoncondhuy/${{ matrix.package.repo }}.git" target-repo

          # Copy package files to target repo
          cp -r ${{ matrix.package.local }}/* target-repo/

          # Commit and push
          cd target-repo
          git add .
          git commit -m "Sync from monorepo" --allow-empty || true
          git push origin main

          # Handle tags: if triggered by a tag, create the same tag in target repo
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref#refs/tags/ }}"
            git tag -a "$TAG_NAME" -m "Release $TAG_NAME - synced from monorepo"
            git push origin "$TAG_NAME"
            echo "✓ Tagged ${{ matrix.package.repo }} with $TAG_NAME"
          fi

          cd ..
          rm -rf target-repo
