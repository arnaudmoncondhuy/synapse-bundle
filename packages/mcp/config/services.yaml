services:
  ArnaudMoncondhuy\SynapseMcp\Tool\ListAgentsTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseAgentRepository'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\RunAgentTestTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Engine\ChatService'
      - '@ArnaudMoncondhuy\SynapseCore\AgentRegistry'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\InspectAgentDebugTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseDebugLogRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\UpdateAgentSystemPromptTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\AgentRegistry'
      - '@doctrine.orm.entity_manager'
    tags:
      - { name: mcp.tool }

  # === Sandbox Tools ===

  ArnaudMoncondhuy\SynapseMcp\Tool\ListPresetsTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseModelPresetRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\CreateSandboxPresetTool:
    public: true
    arguments:
      - '@doctrine.orm.entity_manager'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseModelPresetRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Engine\ModelCapabilityRegistry'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\CreateSandboxAgentTool:
    public: true
    arguments:
      - '@doctrine.orm.entity_manager'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseAgentRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseModelPresetRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\CreateSandboxWorkflowTool:
    public: true
    arguments:
      - '@doctrine.orm.entity_manager'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseWorkflowRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Agent\AgentResolver'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\RunWorkflowTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Agent\MultiAgent\WorkflowRunner'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseWorkflowRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Agent\AgentResolver'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\InspectWorkflowRunTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseWorkflowRunRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\CleanupSandboxTool:
    public: true
    arguments:
      - '@doctrine.orm.entity_manager'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseAgentRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseWorkflowRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseWorkflowRunRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseModelPresetRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  # === CRUD Tools (read + update + delete for models, presets, agents, workflows) ===

  ArnaudMoncondhuy\SynapseMcp\Tool\ListModelsTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseModelRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\ListWorkflowsTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseWorkflowRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

