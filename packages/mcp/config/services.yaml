services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true # Requis par symfony/mcp-bundle pour que les tools soient récupérables via ServiceLocator

    # Auto-découverte de tous les tools MCP sous src/Tool/. L'attribut
    # `#[McpTool]` + autoconfigure ajoute automatiquement le tag `mcp.tool`.
    # Les arguments scalaires (ex: `%synapse.ephemeral.retention_days%`) sont
    # fournis via `#[Autowire]` dans les constructeurs PHP, pas ici — ce qui
    # élimine la classe de bug "drift services.yaml ↔ PHP" qui nous a déjà
    # mordu 3 fois (ListAgentsTool, RunAgentTestTool, CreateSandbox*Tool).
    #
    # Voir feedback_big_chantiers_on_branch.md et le commit de Chantier D
    # phase 2 pour l'historique de ce refacto.
    ArnaudMoncondhuy\SynapseMcp\Tool\:
        resource: '../src/Tool/'
