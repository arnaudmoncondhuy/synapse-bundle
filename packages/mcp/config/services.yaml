      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseWorkflowRepository'
      - '@doctrine.orm.entity_manager'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\UpdateWorkflowTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseWorkflowRepository'
      - '@doctrine.orm.entity_manager'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }

  ArnaudMoncondhuy\SynapseMcp\Tool\DeleteWorkflowTool:
    public: true
    arguments:
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseWorkflowRepository'
      - '@ArnaudMoncondhuy\SynapseCore\Storage\Repository\SynapseAgentRepository'
      - '@doctrine.orm.entity_manager'
      - '@ArnaudMoncondhuy\SynapseCore\Contract\PermissionCheckerInterface'
    tags:
      - { name: mcp.tool }
