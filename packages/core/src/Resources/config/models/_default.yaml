# ============================================================
# FICHIER DE RÉFÉRENCE — Synapse ModelCapabilities
# ============================================================
# Ce fichier documente tous les champs disponibles pour déclarer
# un modèle LLM, avec leurs valeurs par défaut et leur description.
#
# Il n'enregistre aucun modèle (models: {}).
# Il sert de référence pour créer un nouveau fichier provider.
#
# Pour ajouter un provider : créer un nouveau fichier YAML dans
# ce dossier (ex: mistral.yaml) et remplir les valeurs réelles.
#
# Les champs absents d'un fichier provider héritent des valeurs
# définies dans ModelCapabilityRegistry::DEFAULTS (voir ci-dessous).
# ============================================================

defaults_reference:

  # ── Identité ──────────────────────────────────────────────────────────────
  provider: "unknown"          # Requis. Slug du provider (ex: 'my_provider')
  range: "balanced"            # Gamme du modèle : flagship | balanced | fast | specialized
  currency: "USD"              # Devise des tarifs (code ISO 4217). Défaut: USD

  # ── Contexte ──────────────────────────────────────────────────────────────
  context_window: ~            # Legacy (déprécié). Fenêtre totale en tokens — fallback via getEffectiveMaxInputTokens()
  max_input_tokens: ~          # Max tokens acceptés en entrée. null = fallback vers context_window
  max_output_tokens: ~         # Max tokens générables en sortie. null = pas de limite connue

  # ── Capacités (défaut TRUE — couvertes par la plupart des modèles chat) ───
  supports_function_calling: true   # Supporte le tool use / function calling
  supports_streaming: true          # Supporte le streaming SSE/NDJSON
  supports_system_prompt: true      # Supporte un system prompt / instruction système
  supports_text_generation: true    # Supporte la génération de texte (chat/completion)

  # ── Capacités (défaut FALSE — activation opt-in) ──────────────────────────
  supports_thinking: false              # Supporte le raisonnement étendu (thinking budget tokens)
  supports_safety_settings: false       # Supporte les filtres de sécurité granulaires configurables
  supports_top_k: false                 # Supporte le paramètre topK dans generation_config
  supports_vision: false                # Analyse d'images en entrée (multimodal)
  supports_parallel_tool_calls: false   # Appels parallèles de plusieurs tools en une réponse
  supports_response_schema: false       # JSON Mode / Structured Outputs natif
  supports_embedding: false             # Génération d'embeddings vectoriels
  supports_image_generation: false      # Génération d'images en sortie

  # Non encore implémentés dans ModelCapabilities
  # supports_audio_input: false        # Audio en entrée
  # supports_audio_output: false       # Génération audio en sortie (TTS natif)
  # supports_prompt_caching: false     # Prompt caching (réduction coûts 75-90%)
  # supports_web_search: false         # Recherche web intégrée

  # ── Tarification (par million de tokens, null = coût inconnu) ─────────────
  pricing_input: ~             # Coût input standard
  pricing_output: ~            # Coût output standard
  pricing_output_image: ~      # Coût output image (modèles image_generation uniquement)

  # Non encore implémentés dans ModelCapabilities
  # pricing_reasoning_output: ~  # Thinking/reasoning tokens — fallback: pricing_output
  # pricing_cache_write: ~       # Écriture cache — fallback: pricing_input
  # pricing_cache_read: ~        # Lecture cache (souvent ~10% du prix input)

  # ── Lifecycle ─────────────────────────────────────────────────────────────
  deprecated_at: ~             # Date YYYY-MM-DD ou null. Ex: "2026-06-15"

  # ── Provider-specific ─────────────────────────────────────────────────────
  provider_regions: []           # Régions disponibles pour ce modèle (vide = toutes)
  rgpd_risk: ~                 # Risque RGPD inhérent au modèle (null = évalué au runtime par le client LLM)
                               # Valeurs : null | 'danger' | 'tolerated' | 'risk'
                               # 'danger' = toujours interdit pour données sensibles (ex: free tier, entraînement)

  # ── Embeddings ────────────────────────────────────────────────────────────
  dimensions: []               # Tailles de vecteurs disponibles. Ex: [3072, 1536, 768]


